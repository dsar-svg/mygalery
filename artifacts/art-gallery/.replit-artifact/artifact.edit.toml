kind = "web"
previewPath = "/"
title = "Art Gallery & Portfolio"
version = "1.0.0"
id = "artifacts/art-gallery"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18169

[services.development]
run = "pnpm --filter @workspace/art-gallery run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/art-gallery", "run", "build" ]
publicDir = "artifacts/art-gallery/dist"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18169"
BASE_PATH = "/"
